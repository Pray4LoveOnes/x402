name: Build

on:
  push:
    branches: [main, base44app-sonverign-agent-bazaar, attribution-claim-x402-sei]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        run: |
          cd examples/base44app
          npm install
          npm run build
